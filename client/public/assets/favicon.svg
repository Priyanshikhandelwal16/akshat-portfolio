<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
  </defs>
  <!-- Sleek dark background -->
  <rect width="512" height="512" rx="128" fill="#0A0A0A"/>
  <!-- Gold circular thin border -->
  <circle cx="256" cy="256" r="220" stroke="url(#goldGrad)" stroke-width="8" fill="none" opacity="0.3"/>
  <!-- Stylized cinematic letters 'AJ' -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-family="'Syne', 'Inter', sans-serif" font-weight="900" font-size="220" fill="url(#goldGrad)" letter-spacing="-5">AJ</text>
  <!-- Accent orange dot -->
  <circle cx="395" cy="335" r="24" fill="#FF6B35"/>
</svg>
